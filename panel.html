<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Panel</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* RESET */
*{margin:0; padding:0; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif;}

/* BODY */
body{background:#0f2027; color:white; font-size:14px; display:flex; flex-direction:column; height:100vh;}

/* HEADER */
header{background:#1e90ff; color:white; padding:15px; font-weight:bold; display:flex; justify-content:space-between; align-items:center;}

/* BACK BUTTON */
.back-btn{background:rgba(255,255,255,0.2); border:none; padding:8px 12px; color:white; border-radius:6px; cursor:pointer;}
.back-btn:hover{background:rgba(255,255,255,0.4);}

/* CHAT AREA */
.chat-container{flex:1; display:flex; flex-direction:column; padding:10px; overflow:hidden;}
.chat-messages{flex:1; overflow-y:auto; padding:10px; background:rgba(0,0,0,0.85); border-radius:10px;}
.message{margin:10px 0; max-width:80%; padding:8px 12px; border-radius:12px; word-wrap:break-word;}
.message.user{background:#00bfff; color:white; float:right; text-align:right;}
.message.bot{background:#1e90ff; color:white; float:left; text-align:left;}

/* INPUT */
.chat-input{display:flex; margin-top:10px;}
.chat-input input{flex:1; padding:10px 12px; border-radius:20px; border:none; outline:none; font-size:14px; margin-right:10px; background:#222; color:white;}
.chat-input button{background:#1e90ff; border:none; padding:10px 15px; border-radius:50%; cursor:pointer; color:white; font-size:16px;}
.chat-input button:hover{background:#00bfff;}
</style>
</head>
<body>

<header>
  <span>AI Chatbot</span>
  <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back</button>
</header>

<div class="chat-container">
  <div class="chat-messages" id="chatMessages">
    <div class="message bot">Hello! How can I assist you today?</div>
  </div>

  <div class="chat-input">
    <input type="text" id="chatInput" placeholder="Type your message...">
    <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>

<script>
const messages=document.getElementById("chatMessages");
const input=document.getElementById("chatInput");

// Back to dashboard
function goBack(){
  window.location.href="index.html"; // because both are in app directory
}

function sendMessage(){
  const text=input.value.trim();
  if(!text) return;

  // User message
  const userMsg=document.createElement("div");
  userMsg.className="message user";
  userMsg.innerText=text;
  messages.appendChild(userMsg);
  input.value="";
  messages.scrollTop=messages.scrollHeight;

  // Bot response simulation
  setTimeout(()=>{
    const botMsg=document.createElement("div");
    botMsg.className="message bot";
    botMsg.innerText="I received: " + text;
    messages.appendChild(botMsg);
    messages.scrollTop=messages.scrollHeight;
  },800);
}
</script>

</body>
</html>
